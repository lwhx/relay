name: Telegram Star Notifier

# 触发条件：有人点 Star (watch: started) 时触发，或支持在 Actions 面板手动点击触发
on:
  watch:
    types: [started]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Message to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          # 1. 调用 GitHub API 获取当前仓库最新的 Star 总数
          # (这里使用了 actions 自带的 GITHUB_TOKEN，避免 API 请求被限流)
          STARS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}" | jq '.stargazers_count')
          
          # 2. 拼接消息内容，加入 $STARS 变量
          MSG_TEXT="🌟 <b>恭喜！你的项目有了新动态！</b>
          
          👤 用户 <a href=\"https://github.com/${{ github.actor }}\">${{ github.actor }}</a> 刚刚 Star 了你的项目！
          📦 仓库：<a href=\"https://github.com/${{ github.repository }}\">${{ github.repository }}</a>
          📈 当前总 Star 数：<b>${STARS}</b>"
          🔗 地址：<a href=\"https://github.com/${{ github.repository }}\">https://github.com/${{ github.repository }}</a>
          
          # 3. 使用 jq 构建安全的 JSON 数据
          PAYLOAD=$(jq -n \
            --arg chat_id "$TELEGRAM_TO" \
            --arg text "$MSG_TEXT" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}')
            
          echo "获取到当前 Star 总数为: $STARS"
          echo "正在发送请求到 Telegram..."
          
          # 4. 推送到 Telegram
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
