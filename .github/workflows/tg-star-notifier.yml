name: Telegram Star Notifier

# 触发条件：有人 Star 时触发，或支持在 Actions 面板手动点击触发（方便调试）
on:
  star:
    types: [created]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Message to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 将消息设为环境变量，结合 HTML 解析，彻底告别 Markdown 的转义报错
          MSG_TEXT: |
            🌟 <b>恭喜！你的项目有了新动态！</b>
            
            👤 用户 <a href="https://github.com/${{ github.actor }}">${{ github.actor }}</a> 刚刚 Star 了你的项目！
            📦 仓库：<a href="https://github.com/${{ github.repository }}">${{ github.repository }}</a>
        run: |
          # 使用 jq 抓取环境变量并构建安全的 JSON 数据
          PAYLOAD=$(jq -n \
            --arg chat_id "$TG_CHAT_ID" \
            '{chat_id: $chat_id, text: env.MSG_TEXT, parse_mode: "HTML", disable_web_page_preview: true}')
            
          # 打印发送状态，方便在 GitHub Actions 日志中排查问题
          echo "正在发送请求到 Telegram..."
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
